plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// 릴리즈 서명용 키 정보 로드.
// key.properties는 gitignored. 파일이 없으면 debug 서명으로 폴백해 로컬 빌드는 그대로 가능.
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.hojung.strikelog"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // flutter_local_notifications가 core library desugaring을 요구
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        applicationId = "com.hojung.strikelog"
        // flutter_local_notifications 권장 최소 SDK
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            // key.properties 누락 시 storeFile=null이 되도록 방어. (build 시점에 검증 메시지 출력)
            if (keystoreProperties.getProperty("storeFile") != null) {
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
            }
        }
    }

    buildTypes {
        release {
            // key.properties가 있으면 release 서명, 없으면 debug 서명으로 폴백.
            // 폴백 빌드는 Play Store에 업로드 불가하지만 로컬 검증은 가능.
            signingConfig = keystoreProperties.getProperty("storeFile") != null
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}

flutter {
    source = "../.."
}
